# Cloudflare Pages 项目配置
# 注意：此文件仅供参考，实际配置在 Cloudflare Dashboard 中完成

name = "couple-commitment-tracker"
production_branch = "main"

# 构建配置
[build]
  command = "npm run build"
  
  [build.environment]
    NODE_VERSION = "18"

# 构建输出目录
[site]
  bucket = "frontend/dist"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "couple-commitment-db"
database_id = "YOUR_D1_DATABASE_ID"

# R2 存储桶绑定
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "couple-photos"

# KV 命名空间绑定
[[kv_namespaces]]
binding = "SESSION_STORE"
id = "YOUR_KV_NAMESPACE_ID"

# 环境变量
[vars]
JWT_SECRET = "your-secret-key-change-in-production"
