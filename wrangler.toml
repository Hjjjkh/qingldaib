# Cloudflare Pages Configuration
# 
# Build Configuration:
# - Build command: npm run build
# - Build output directory: frontend/dist
#
# Resources are configured via Dashboard:
# Settings → Bindings
#   - D1 Database: DB → couple-commitment-db
#   - KV Namespace: SESSION_STORE → couple-commitment-tracker  
#   - R2 Bucket: PHOTOS → couple-photos
#
# Environment Variables:
# Settings → Environment variables
#   - JWT_SECRET: your-secret-key

name = "couple-commitment"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./frontend/dist"

# DO NOT add d1_databases, kv_namespaces, or r2_buckets here
# These are managed via Cloudflare Dashboard Bindings

[vars]
JWT_SECRET = "default-secret-change-in-dashboard"
