name = "couple-commitment-tracker"
compatibility_date = "2024-01-01"
pages_build_output_dir = "./frontend/dist"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "couple-commitment-db"
database_id = ""  # 自动创建时留空

# KV Namespace
[[kv_namespaces]]
binding = "SESSION_STORE"
id = ""  # 自动创建时留空
preview_id = ""

# R2 Bucket
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "couple-photos"

# Environment Variables
[vars]
JWT_SECRET = "couple-app-default-secret-change-me"
