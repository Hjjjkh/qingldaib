# Cloudflare Pages Configuration
# https://developers.cloudflare.com/pages/platform/functions/

name = "couple-commitment-tracker"
compatibility_date = "2024-01-01"

# Pages build output directory
pages_build_output_dir = "./frontend/dist"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "couple-commitment-db"

# KV Namespace binding
[[kv_namespaces]]
binding = "SESSION_STORE"

# R2 Bucket binding
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "couple-photos"

# Environment variables
[vars]
JWT_SECRET = "couple-app-default-secret-change-in-dashboard"
