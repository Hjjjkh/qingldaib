name = "couple-commitment"
compatibility_date = "2024-01-01"

[site]
bucket = "./frontend/dist"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "couple-commitment-db"

# KV Namespace
[[kv_namespaces]]
binding = "SESSION_STORE"

# R2 Bucket
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "couple-photos"

# Environment Variables
[vars]
JWT_SECRET = "default-secret-change-in-dashboard"
